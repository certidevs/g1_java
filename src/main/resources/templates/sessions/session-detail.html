<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Detalle de sesion')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <!-- Cabecera de la proyeccion -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <h1>
            <i class="fa-solid fa-film text-primary me-2"></i>
            <span th:text="${proyeccion.movie != null ? proyeccion.movie.title : 'Función'}">Función</span>
        </h1>
        <a th:href="@{/sessions}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver a funciones
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Pelicula</th>
                <th>Hora de la funcion</th>
                <th>Sala</th>
                <th>Duracion</th>
                <th>Precio</th>
                <th>Idioma</th>
                <th>Tipo de pantalla</th>
                <th>Cantidad de anuncios</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${proyeccion.id}"></td>
                <td class="fw-semibold" th:text="${proyeccion.movie != null ? proyeccion.movie.title : 'Sin película'}"></td>
                <td class="text-muted small" th:text="${proyeccion.startTime != null ? #temporals.format(proyeccion.startTime, 'dd/MM/yyyy HH:mm') : 'Sin horario'}"></td>
                <td class="text-muted small" th:text="${proyeccion.room != null ? proyeccion.room.name : 'Sin sala'}"></td>
                <td class="text-muted small" th:text="${proyeccion.movie != null ? proyeccion.movie.duration : 'N/A'}"></td>
                <td>
                    <span class="badge bg-success" th:text="${proyeccion.room.price} + ' €'"></span>
                </td>
                <td>
                    <span class="badge bg-light text-dark border" th:text="${proyeccion.language}"></span>
                </td>
                <td>
                    <span class="badge bg-secondary"
                          th:text="${proyeccion.room != null ? proyeccion.room.screentype.label : 'N/A'}"></span>
                </td>
                <td class="text-muted small" th:text="${proyeccion.numAds != null ? proyeccion.numAds : '-'}"></td>

            </tr>
            </tbody>
        </table>
        <div class="mt-3">
            <a th:href="@{/sessions/edit/{id}(id=${proyeccion.id})}"
               class="btn btn-success btn-sm">
                <i class="fa-solid fa-pencil me-1"></i> Editar
            </a>
            <a th:href="@{/sessions/deactivate/{id}(id=${proyeccion.id})}"
               class="btn btn-warning btn-sm"
               onclick="return confirm('¿Estás seguro de que querés desactivar esta función?')">
                <i class="fa-solid fa-ban me-1"></i> Desactivar
            </a>
        </div>

<!--        if sesion.active true mostramos tickets a la venta-->
<!--        if session.active false no mostramos tickets y ponemos un mensaje de disculpas -->

        <!-- TODO lista de tickets asociados a esta Session -->


            <!-- TODO cada ticket tiene un botón de compra GET /tickets/new?sessionId=1 -->

            <!-- purchateTime != null  entonces no hay botón de compra -->


<!--        <div th:if="${session.active == true : }" >-->

<!--        <table>-->
<!--            <tr>-->
<!--                &lt;!&ndash; Bucle para generar celdas th &ndash;&gt;-->

<!--                <th th:each="butaca : ${listaButaca}" th:text="${butaca}"></th>-->
<!--                -->
<!--            </tr>-->
<!--        </table>-->

        <div th:if="${proyeccion.active}" class="mt-4">

            <h3 class="mb-1">Seleccioná tu butaca</h3>

            <!-- Pantalla del cine -->
            <div class="bg-dark text-white text-center py-2 rounded mb-3 mx-auto"
                 style="max-width: 640px;">
                <small><i class="fa-solid fa-tv me-1"></i> PANTALLA</small>
            </div>

            <!-- Butacas -->
<!--            El th:block no genera html simplemente que si utilizo div como conteiner no se veian bien las butacas-->
            <div class="d-flex flex-wrap gap-2 mb-4 mx-auto" style="max-width: 640px;">
                <th:block th:each="ticket : ${tickets}">

                    <!-- fuerza nueva línea y muestra la letra cuando empieza una fila nueva -->
                    <div th:if="${ticket.seatNumber == 1}" class="w-100">
                        <small class="fw-bold text-secondary" th:text="'Fila ' + ${ticket.seatRow}"></small>
                    </div>

                    <!-- Disponible -->
                    <a th:if="${ticket.purchaseTime == null}"
                       th:href="@{/tickets/new(sessionId=${proyeccion.id})}"
                       class="btn btn-success d-flex align-items-center justify-content-center"
                       style="width: 52px; height: 52px;"
                       th:title="'Butaca ' + ${ticket.seatNumber}"
                       th:text="${ticket.seatNumber}">

                    </a>

                    <!-- Vendida -->
                    <button th:unless="${ticket.purchaseTime == null}"
                            class="btn btn-danger d-flex align-items-center justify-content-center"
                            style="width: 52px; height: 52px;"
                            th:title="'Vendida ' + ${ticket.seatNumber}"
                            th:text="${ticket.seatNumber}"
                            disabled>
                    </button>

                </th:block>
            </div>
<!--            Esto &nbsp; es un ESPACIO EN BLANCO-->
            <div class="d-flex gap-3 justify-content-center mt-2 mx-auto" style="max-width: 640px;">
                <span><span class="badge bg-success" style="width:20px; display:inline-block;">&nbsp;</span> Disponible</span>
                <span><span class="badge bg-danger"  style="width:20px; display:inline-block;">&nbsp;</span> Vendida</span>
            </div>

        </div>

        <div th:unless="${proyeccion.active}" class="mt-4">
            <div class="alert alert-warning">
                <i class="fa-solid fa-ban me-1"></i> Esta función no está disponible.
            </div>
        </div>

    </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
