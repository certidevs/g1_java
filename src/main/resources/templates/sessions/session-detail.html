<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Detalle de sesion')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <!-- Cabecera de la proyeccion -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <h1>
            <i class="fa-solid fa-film text-primary me-2"></i>
            <span th:text="${proyeccion.movie != null ? proyeccion.movie.title : 'Función'}">Función</span>
        </h1>
        <a th:href="@{/sessions}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver a funciones
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Pelicula</th>
                <th>Hora de la funcion</th>
                <th>Sala</th>
                <th>Duracion</th>
                <th>Precio</th>
                <th>Idioma</th>
                <th>Tipo de pantalla</th>
                <th>Cantidad de anuncios</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${proyeccion.id}"></td>
                <td class="fw-semibold" th:text="${proyeccion.movie != null ? proyeccion.movie.title : 'Sin película'}"></td>
                <td class="text-muted small" th:text="${proyeccion.startTime != null ? #temporals.format(proyeccion.startTime, 'dd/MM/yyyy HH:mm') : 'Sin horario'}"></td>
                <td class="text-muted small" th:text="${proyeccion.room != null ? proyeccion.room.name : 'Sin sala'}"></td>
                <td class="text-muted small" th:text="${proyeccion.movie != null ? proyeccion.movie.duration : 'N/A'}"></td>
                <td>
                    <span class="badge bg-success" th:text="${proyeccion.room.price} + ' €'"></span>
                </td>
                <td>
                    <span class="badge bg-light text-dark border" th:text="${proyeccion.language}"></span>
                </td>
                <td>
                    <span class="badge bg-secondary"
                          th:text="${proyeccion.room != null ? proyeccion.room.screentype.label : 'N/A'}"></span>
                </td>
                <td class="text-muted small" th:text="${proyeccion.numAds != null ? proyeccion.numAds : '-'}"></td>

            </tr>
            </tbody>
        </table>
        <div class="mt-3">
            <a th:href="@{/sessions/edit/{id}(id=${proyeccion.id})}"
               class="btn btn-success btn-sm">
                <i class="fa-solid fa-pencil me-1"></i> Editar
            </a>
            <a th:href="@{/sessions/deactivate/{id}(id=${proyeccion.id})}"
               class="btn btn-warning btn-sm"
               onclick="return confirm('¿Estás seguro de que querés desactivar esta función?')">
                <i class="fa-solid fa-ban me-1"></i> Desactivar
            </a>
        </div>

        <h2>Compra tu ticket</h2>

<!--        if sesion.active true mostramos tickets a la venta-->
<!--        if session.active false no mostramos tickets y ponemos un mensaje de disculpas -->

        <!-- TODO lista de tickets asociados a esta Session -->


            <!-- TODO cada ticket tiene un botón de compra GET /tickets/new?sessionId=1 -->

            <!-- purchateTime != null  entonces no hay botón de compra -->

    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
