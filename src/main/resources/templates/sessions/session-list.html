<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Cines')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-0">Listado de funciones</h1>
            <span class="badge bg-secondary fs-6 mt-1" th:text="|${numSessions} funciones|"></span>
        </div>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/sessions/new}" class="btn btn-outline-info" role="button">
            <i class="fa-solid fa-plus me-1"></i> Agregar función
        </a>
    </div>

    <div class="mb-3">
        <h5>Filtros rápidos</h5>
        <a th:href="@{/sessions}" class="btn btn-sm btn-primary">Todos</a>
        <a th:href="@{/sessions(language='VO')}" class="btn btn-sm btn-secondary">Versión Original</a>
        <a th:href="@{/sessions(language='DOB')}" class="btn btn-sm btn-secondary">Doblada</a>
        <a th:href="@{/sessions(screentype='IMAX')}" class="btn btn-sm btn-info">IMAX</a>
        <a th:href="@{/sessions(screentype='THREE_D')}" class="btn btn-sm btn-info">3D</a>
    </div>

    <div class="mb-3">
        <h5>Búsqueda avanzada</h5>
        <form th:action="@{/sessions}" method="get" class="row align-items-end">
            <div class="col-auto">
                <label class="form-label form-label-sm">Película</label>
                <input type="text" name="title" class="form-control form-control-sm"
                       placeholder="Buscar por película..." th:value="${param.title}">
            </div>
            <div class="col-auto">
                <label class="form-label form-label-sm">Idioma</label>
                <select name="language" class="form-select form-select-sm">
                    <option value="">Todos</option>
                    <option th:each="lang : ${T(com.demo.model.enums.Language).values()}"
                            th:value="${lang}" th:text="${lang.label}">
                    </option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar
                </button>
                <a th:href="@{/sessions}" class="btn btn-danger btn-sm">
                    <i class="fa-solid fa-broom"></i> Limpiar filtros
                </a>
            </div>
        </form>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="cinemaFunction : ${cinemaFunctions}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-clock text-primary me-2"></i>
                        <span th:text="${#temporals.format(cinemaFunction.startTime, 'dd/MM/yyyy HH:mm')}">Horario</span>
                    </h5>
                    <p class="card-text">
                        <strong>Película:</strong>
                        <span th:text="${cinemaFunction.movie != null ? cinemaFunction.movie.title : 'Sin película'}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Sala:</strong>
                        <span th:text="${cinemaFunction.room != null ? cinemaFunction.room.name : 'Sin sala'}"></span>
                    </p>
                    <p class="card-text">
                      <span class="badge bg-success">
                          <i class="fa-solid fa-euro-sign me-1"></i>
                          <span th:text="${cinemaFunction.room.price}"></span>
                      </span>
                        <span class="badge bg-info text-dark ms-1" th:text="${cinemaFunction.language}"></span>
                        <span class="badge bg-secondary ms-1" th:text="${cinemaFunction.room != null ? cinemaFunction.room.screentype.label : ''}"></span>
                    </p>


                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/sessions/{id}(id=${cinemaFunction.id})}"
                       class="btn btn-outline-info btn-sm w-100 mb-1">
                        <i class="fa-regular fa-eye me-1"></i> Ver detalles
                    </a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/sessions/edit/{id}(id=${cinemaFunction.id})}"
                       class="btn btn-outline-info btn-sm w-100 mb-1">
                        <i class="fa-solid fa-pencil me-1"></i> Editar
                    </a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/sessions/deactivate/{id}(id=${cinemaFunction.id})}"
                       class="btn btn-outline-info btn-sm w-100"
                       onclick="return confirm('¿Estás seguro de que querés desactivar esta función?')">
                        <i class="fa-solid fa-ban me-1"></i> Desactivar
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
