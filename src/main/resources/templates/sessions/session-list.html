<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Cines')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <!-- Cabecera: título + botón + badge -->
            <div class="d-flex align-items-center mb-4">
                <h1 class="h3 mb-0">Listado de funciones</h1>

                <span class="badge bg-secondary fs-6 ms-auto me-2" th:text="|${numSessions} funciones|"></span>

                <a sec:authorize="hasRole('ADMIN')" th:href="@{/sessions/new}" class="btn btn-outline-info" role="button">
                    <i class="fa-solid fa-plus me-1"></i> Agregar función
                </a>
            </div>

            <!-- Filtros rápidos -->
            <div class="mb-3">
                <h5>Filtros rápidos</h5>
                <a th:href="@{/sessions}" class="btn btn-sm btn-primary">Todos</a>
                <a th:href="@{/sessions(language='VOSE')}" class="btn btn-sm btn-secondary">Versión Original Subtitulada en español</a>
                <a th:href="@{/sessions(language='ESP')}" class="btn btn-sm btn-secondary">Español</a>
                <a th:href="@{/sessions(screentype='IMAX')}" class="btn btn-sm btn-info">IMAX</a>
                <a th:href="@{/sessions(screentype='THREE_D')}" class="btn btn-sm btn-info">3D</a>
            </div>

            <!-- Búsqueda avanzada -->
            <div>
                <h5>Búsqueda avanzada</h5>
                <form th:action="@{/sessions}" method="get" class="row align-items-end">
                    <div class="col">
                        <label class="form-label form-label-sm">Película</label>
                        <input type="text" name="title" class="form-control form-control-sm"
                               placeholder="Buscar por película..." th:value="${param.title}">
                    </div>
                    <div class="col-auto">
                        <label class="form-label form-label-sm">Idioma</label>
                        <select name="language" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option th:each="lang : ${T(com.demo.model.enums.Language).values()}"
                                    th:value="${lang}" th:text="${lang.label}">
                            </option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="fa-solid fa-magnifying-glass"></i> Buscar
                        </button>
                        <a th:href="@{/sessions}" class="btn btn-danger btn-sm">
                            <i class="fa-solid fa-broom"></i> Limpiar filtros
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>

        <!-- NIVEL 1: por DÍA -->
        <div th:each="dia : ${dias}" class="mb-4">

            <h4 class="border-bottom pb-2 mb-3">
                <i class="fa-solid fa-calendar-day text-primary me-2"></i>
                <span th:text="${#temporals.format(dia, 'dd/MM/yyyy')}">Día</span>
            </h4>

            <!-- NIVEL 2: por PELÍCULA -->
            <div class="row row-cols-1 row-cols-md-2 g-3">
                <div class="col" th:each="pelicula : ${peliculas}">
                    <div class="card h-100 shadow-sm">

                        <!-- Título de la película -->
                        <div class="card-header bg-primary text-white">
                            <i class="fa-solid fa-film me-2"></i>
                            <span th:text="${pelicula.title}">Película</span>
                        </div>

                        <!-- NIVEL 3: las sesiones de ESA película en ESE día -->
                        <div class="card-body">
                            <div th:each="cinemaFunction : ${cinemaFunctions}"
                                 th:if="${cinemaFunction.movie != null
                                    and cinemaFunction.movie.id == pelicula.id
                                    and cinemaFunction.startTime.toLocalDate() == dia}"
                                 class="d-flex justify-content-between align-items-center mb-2">

                          <span>
                              <i class="fa-solid fa-clock text-primary me-1"></i>
                              <strong th:text="${#temporals.format(cinemaFunction.startTime, 'HH:mm')}">Hora</strong>
                              <span class="text-muted ms-1" th:text="${cinemaFunction.room != null ?
                                        cinemaFunction.room.name : ''}">Sala</span>
                              <span class="badge bg-info text-dark ms-1"
                                    th:text="${cinemaFunction.language}">Idioma</span>
                              <span class="badge bg-secondary ms-1" th:text="${cinemaFunction.room != null ?
                                        cinemaFunction.room.screentype.label : ''}">Pantalla</span>
                              <span class="badge bg-success ms-1">
                                  <i class="fa-solid fa-euro-sign me-1"></i><span
                                      th:text="${cinemaFunction.room.price}">0</span>
                              </span>
                          </span>

                                <span>
                              <a th:href="@{/sessions/{id}(id=${cinemaFunction.id})}" class="btn btn-outline-info btn-sm">
                                  <i class="fa-regular fa-eye"></i>
                              </a>
                              <a sec:authorize="hasRole('ADMIN')"
                                 th:href="@{/sessions/edit/{id}(id=${cinemaFunction.id})}" class="btn btn-outline-info btn-sm">
                                  <i class="fa-solid fa-pencil"></i>
                              </a>
                              <a sec:authorize="hasRole('ADMIN')"
                                 th:href="@{/sessions/deactivate/{id}(id=${cinemaFunction.id})}" class="btn btn-outline-info btn-sm"
                                 onclick="return confirm('¿Seguro que quieres desactivar esta función?')">
                                  <i class="fa-solid fa-ban"></i>
                              </a>
                          </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
