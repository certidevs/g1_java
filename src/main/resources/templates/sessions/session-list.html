<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Cines')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="cinemaFunction : ${cinemaFunctions}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-clock text-primary me-2"></i>
                        <span th:text="${#temporals.format(cinemaFunction.startTime, 'dd/MM/yyyy HH:mm')}">Horario de la función</span>
                    </h5>
                    <p class="card-text">
                        <strong>Película:</strong>
                        <span th:text="${cinemaFunction.movie != null ? cinemaFunction.movie.title : 'Sin película'}">Título película</span>
                    </p>
                    <p class="card-text">
                        <strong>Sala:</strong>
                        <span th:text="${cinemaFunction.room != null ? cinemaFunction.room.id : 'Sin sala'}">Sala</span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${cinemaFunction.price}">Precio</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/sessions/{id}(id=${cinemaFunction.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver detalles
                    </a>
                </div>
            </div>
        </div>
    </div>

<!--Esto lo veremos con el form y para usuario admin-->
    <div class="mt-4">
        <a th:href="@{/sessions/create}" class="btn btn-success">
            <i class="fa-solid fa-plus me-1"></i> Crear session
        </a>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
