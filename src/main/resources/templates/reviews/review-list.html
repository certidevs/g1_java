<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Reseñas')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

  <h1 class="mb-4">
    <i class="fa-regular fa-comments text-primary me-2"></i> Opiniones de los usuarios
  </h1>

  <!-- Mensajes flash (éxito y error) -->
  <div th:if="${message}" class="alert alert-success fade show" role="alert">
    <i class="fa-solid fa-check-circle me-2"></i>
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger fade show" role="alert">
    <i class="fa-solid fa-triangle-exclamation me-2"></i>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <!-- Alerta cuando no hay reseñas -->
  <div th:if="${reviews == null or reviews.isEmpty()}" class="alert alert-light border">
    <i class="fa-regular fa-comment me-2"></i> Aún no hay reseñas.
  </div>

  <!-- Grid de reseñas -->
  <div class="row row-cols-1 row-cols-md-2 g-4" th:unless="${reviews.isEmpty()}">
    <div class="col" th:each="review : ${reviews}">
      <div class="card h-100 shadow-sm">

        <!-- Card Body: Contenido principal -->
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title mb-0 flex-grow-1" th:text="${review.title}">Título</h5>
            <!-- Rating badge -->
            <span class="badge bg-warning text-dark ms-2">
              <i class="fa-solid fa-star me-1"></i>
              <span th:text="${review.rating + '/5'}"></span>
            </span>
          </div>

          <!-- Descripción -->
          <p class="card-text" th:text="${review.description}">Descripción</p>

          <!-- Meta info: Fecha y usuario -->
          <div class="small text-muted">
            <div class="mb-1">
              <i class="fa-regular fa-calendar me-1"></i>
              <span th:text="${#temporals.format(review.creationDate, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div th:if="${review.user != null}">
              <i class="fa-regular fa-user me-1"></i>
              <span th:text="${review.user.username}"></span>
            </div>
          </div>
        </div>

        <!-- Card Footer: Película y botones de acción -->
        <div class="card-footer bg-white border-top">
          <!-- Película asociada -->
          <div th:if="${review.movie != null}" class="mb-3">
            <i class="fa-solid fa-film text-primary me-2"></i>
            <a th:href="@{/movies/{id}(id=${review.movie.id})}"
               th:text="${review.movie.title}"
               class="text-decoration-none fw-semibold">Película</a>
          </div>

          <!-- Botones de acción -->
          <div class="d-flex flex-wrap gap-2">
            <!-- Botón Ver (para todos) -->
            <a class="btn btn-sm btn-outline-secondary"
               th:href="@{/reviews/{id}(id=${review.id})}">
              <i class="fa-solid fa-eye me-1"></i> Ver
            </a>

            <!-- Botón Editar (ADMIN o autor) -->
            <a sec:authorize="hasRole('ADMIN')"
               class="btn btn-sm btn-outline-success"
               th:href="@{/reviews/edit/{id}(id=${review.id})}">
              <i class="fa-solid fa-pencil me-1"></i> Editar
            </a>

            <a th:if="${currentUser != null and review.user != null and review.user.id == currentUser.id}"
               class="btn btn-sm btn-outline-success"
               th:href="@{/reviews/edit/{id}(id=${review.id})}">
              <i class="fa-solid fa-pencil me-1"></i> Editar
            </a>

            <!-- Botón Borrar (solo ADMIN) -->
            <a sec:authorize="hasRole('ADMIN')"
               class="btn btn-sm btn-outline-danger"
               th:href="@{/reviews/delete/{id}(id=${review.id})}"
               onclick="return confirm('¿Seguro que quieres borrar esta reseña?')">
              <i class="fa-solid fa-trash me-1"></i> Borrar
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
