<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Tickets')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mis Tickets</h2>
    </div>

    <!-- Si no hay tickets -->
    <div th:if="${tickets.isEmpty()}" class="alert alert-info">
        <i class="fa-solid fa-info-circle me-2"></i>
        No hay tickets disponibles.
    </div>

    <!-- Lista de tickets -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" th:unless="${tickets.isEmpty()}">
        <div class="col" th:each="ticket : ${tickets}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Detalles del ticket</h5>
                            <p class="card-text">
                                <strong>ID:</strong> <span th:text="${ticket.id}">0</span>
                            </p>
                            <p class="card-text">
                                <strong>Fila:</strong> <span th:text="${ticket.seatRow}">Fila</span>
                            </p>
                            <p class="card-text">
                                <strong>Número de Asiento:</strong> <span th:text="${ticket.seatNumber}">0</span>
                            </p>
                            <p class="card-text">
                                <strong>Tipo de Ticket:</strong> <span th:text="${ticket.ticketType}">STANDARD</span>
                            </p>
                            <p class="card-text">
                                <strong>Precio:</strong> <span class="fw-bold text-success">
                                <span th:if="${ticket.price != null}"
                                      th:text="|${#numbers.formatDecimal(ticket.price, 1, 2)} €|">0,00 €</span>
                                <span th:unless="${ticket.price != null}" class="text-muted small">Sin precio</span>
                            </span>
                            </p>
                        </div>
                        <div class="card-footer bg-transparent border-0 pt-0">
                            <a th:href="@{/tickets/{id}(id=${ticket.id})}"
                               class="btn btn-outline-primary btn-sm w-100">
                                <i class="fa-regular fa-eye me-1"></i> Ver detalles
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--Botón para crear nuevo ticket (cuando esté implementado)-->
    <div class="mt-4">
        <a th:href="@{/tickets/create}" class="btn btn-success">
            <i class="fa-solid fa-plus me-1"></i> Crear ticket
        </a>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
