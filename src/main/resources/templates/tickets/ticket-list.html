<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Tickets')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Tickets</h2>
    </div>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/tickets/new}" class="btn btn-primary btn-sm mb-2">
        <i class="fa-solid fa-plus"></i>
        Crear ticket
    </a>

    <div class="mb-3">
        <h5>Búsqueda avanzada</h5>
        <form th:action="@{/tickets}" method="get" class="row align-items-end">
            <!-- Filtro por palabra en titulo-->
            <div class="col-auto">
                <label class="form-label form-label-sm">Título</label>
                <input type="text" name="title" class="form-control form-control-sm"
                       placeholder="Busca por título de película..." th:value="${param.title}">
            </div>
            <!-- Filtro por precio-->
            <div class="col-auto">
                <label for="price" class="form-label form-label-sm">Precio del ticket</label>
                <input type="number" min="5" id="price" step="0.01" name="price"
                       class="form-control form-control-sm"
                       placeholder="Introduce un precio máximo..." th:value="${param.price}">
            </div>

            <!-- Filtro por sessions-->
            <div class="col-auto">
                <label class="form-label form-label-sm">Función</label>

                <select name="sessionId" class="form-select form-select-sm">

                    <option value="">Todas</option>

                    <option th:each="movieSession : ${sessions}"
                            th:value="${movieSession.id}"
                            th:text="${movieSession.movie.title}"
                            th:selected="${param.sessionId == movieSession.id}">
                    </option>

                </select>
            </div>

            <!-- Filtro por fecha de compra -->
            <div sec:authorize="hasRole('ADMIN')"  class="col-auto" >
                <label class="form-label form-label-sm">Fecha de Compra</label>
                <input type="datetime-local" name="purchaseTime" class="form-control form-control-sm"
                       placeholder="Selecciona una fecha..." th:value="${param.purchaseTime}">
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </button>
                <a th:href="@{/tickets}" class="btn btn-info btn-sm"><i class="fa-solid fa-broom"></i>
                    Limpiar Filtros
                </a>
            </div>
        </form>
    </div>

    <!-- Si no hay tickets -->
    <div th:if="${tickets.isEmpty()}" class="alert alert-info">
        <i class="fa-solid fa-info-circle me-2"></i>
        No hay tickets disponibles.
    </div>

    <!-- Lista de tickets -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" th:unless="${#lists.isEmpty(tickets)}">
        <div class="col" th:each="ticket : ${tickets}">
            <div class="card card-restaurant h-100 shadow-sm border-0">
                <div class="card-body">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Detalles del ticket</h5>
                            <p class="card-text">
                                <strong>ID:</strong> <span th:text="${ticket.id}">0</span>
                            </p>
                            <p class="card-text">
                                <strong>Fila:</strong> <span th:text="${ticket.seatRow}">Fila</span>
                            </p>
                            <p class="card-text">
                                <strong>Número de Asiento:</strong> <span th:text="${ticket.seatNumber}">0</span>
                            </p>
                            <p class="card-text">
                                <strong>Precio:</strong> <span class="fw-bold text-success">
                                <span th:if="${ticket.price != null}"
                                      th:text="|${#numbers.formatDecimal(ticket.price, 1, 2)} €|">0,00 €</span>
                                <span th:unless="${ticket.price != null}" class="text-muted small">Sin precio</span>
                            </span>
                            </p>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                            <small class="text-muted text-truncate me-2" th:if="${ticket.session != null}">
                                <i class="fa-solid fa-person-booth text-danger me-1"></i>
                                <a th:href="@{/sessions/{id}(id=${ticket.session.id})}"
                                   class="text-decoration-none text-muted"
                                   th:text="${ticket.session.language}">Función</a>
                            </small>
                            <a th:href="@{/tickets/{id}(id=${ticket.id})}"
                               class="btn btn-sm btn-outline-primary flex-shrink-0">
                                <i class="fa-regular fa-eye me-1"></i>Ver detalles
                            </a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/tickets/edit/{id}(id=${ticket.id})}"
                               class="btn btn-sm btn-success btn-sm  flex-shrink-0">
                                <i class="fa-solid fa-pencil me-1"></i>Editar
                            </a>
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/tickets/deactivate/{id}(id=${ticket.id})}"
                                class="btn btn-sm btn-danger flex-shrink-0"
                                onclick="return confirm('¿Estás seguro de que quieres desactivar este ticket?')">
                                <i class="fa-solid fa-ban me-1"></i> Desactivar

                            </a>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
