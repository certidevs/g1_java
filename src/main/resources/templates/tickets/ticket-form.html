<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Formulario Ticket')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <h1 class="mb-0">
        <i class="fa-solid fa-ticket text-primary me-2"></i>Formulario de ticket
    </h1>

    <!-- TODO formulario para crear o editar un ticket -->
    <form th:action="@{/tickets}" method="post" th:object="${ticket}">
        <input type="hidden" th:field="*{id}">

        <!-- campos del ticket-->
        <div class="mb-3">
            <label for="session.id" class="form-label">Función</label>
            <select class="form-select" id="session.id" th:field="*{session.id}">
                <option value=""></option>
                <option th:each="projection : ${projections}"
                        th:value="${projection.id}"
                        th:text="${projection.movie.title + ' - ' + projection.language + ' - ' + projection.startTime}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label for="seatRow" class="form-label">Fila</label>
            <input type="text" class="form-control" id="seatRow"
                   th:field="*{seatRow}" placeholder="Ejemplo: A, B, C..." required readonly>
        </div>
        <div class="mb-3">
            <label for="seatNumber" class="form-label">Numero de asiento</label>
            <input type="number" class="form-control" id="seatNumber"
                   th:field="*{seatNumber}" step="1" min="1" placeholder="Ejemplo: 1, 2, 3..." required readonly>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Precio</label>
            <input type="number" class="form-control" id="price"
                   th:field="*{price}" step="0.1" min="0" readonly>
                <small class="form-text text-muted">Precio calculado por sala seleccionada</small>

        </div>

        <div class="mb-3" sec:authorize="hasRole('ADMIN')">
            <label for="user" class="form-label">Usuario cliente</label>
            <select class="form-select" id="user" th:field="*{user}" required>
                <option value=""></option>
                <option
                        th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.id + ' - ' + user.username + '-' + user.email}">
                </option>
            </select>
        </div>

        <!-- TODO combos opcionales € -->
        <div class="mb-3">
            <label for="priceCombo" class="form-label">Precio combo comida opcional</label>
            <select class="form-select" id="priceCombo" th:field="*{priceCombo}">
                <option value=""></option>
                <option value="5">Palomitas 5 Euros</option>
                <option value="8">Palomitas + Bebida 8 Euros</option>
                <option value="15">Palomitas + Bebida + Lacasitos 15 Euros</option>
            </select>

        </div>

        <!-- maxUses type number  de 1 a 5 por ejemplo-->

        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i> Guardar
        </button>

        <a th:href="@{/tickets}" class="btn btn-secondary">Cancelar</a>
    </form>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
