<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Formulario Ticket')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 mb-5">

	<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
		<div>
			<p class="ticket-subtitle text-uppercase fw-bold mb-1">Compra FluxFilms</p>
			<h1 class="h3 fw-bold mb-0">Ticket seleccionado</h1>
		</div>
		<a th:href="@{/tickets}" class="btn btn-outline-primary btn-sm">
			<i class="fa-solid fa-arrow-left me-1"></i>
			Cancelar
		</a>
	</div>

	<form th:action="@{/tickets}" method="post" th:object="${ticket}">
		<input type="hidden" th:field="*{id}">
		<input type="hidden" id="priceComboHidden" th:field="*{priceCombo}">

		<div class="row g-4 align-items-start">
			<div class="col-12 col-lg-8">
				<div class="ticket mb-4">
					<div class="d-flex flex-column flex-sm-row gap-3">
						<div class="flex-shrink-0">
							<img th:if="${ticket.session != null and ticket.session.movie.imageUrl != null}"
							     th:src="${ticket.session.movie.imageUrl}"
							     th:alt="${ticket.session.movie.title}"
							     class="rounded object-fit-cover"
							     style="width: 108px; height: 152px;">
							<div th:unless="${ticket.session != null and ticket.session.movie.imageUrl != null}"
							     class="rounded bg-dark d-flex align-items-center justify-content-center"
							     style="width: 108px; height: 152px;">
								<i class="fa-solid fa-film fa-2x text-secondary"></i>
							</div>
						</div>

						<div class="flex-grow-1 min-w-0">
							<p class="ticket-subtitle text-uppercase fw-bold mb-1">Entrada</p>
							<h2 class="h4 fw-bold text-uppercase text-flux-dark mb-2"
							    th:text="${ticket.session != null ? ticket.session.movie.title : 'Sin funcion'}">
								Pelicula
							</h2>

							<input type="hidden" th:field="*{session.id}">

							<div class="row g-2 small mb-3">
								<div class="col-12 col-md-6">
									<span class="text-muted d-block">Función</span>
									<strong th:text="${ticket.session != null ? ticket.session.language + ' - ' + #temporals.format(ticket.session.startTime, 'dd/MM/yyyy HH:mm') : '-'}">
										Función
									</strong>
								</div>
								<input type="hidden" th:field="*{seatRow}">
								<input type="hidden" th:field="*{seatNumber}">
								<input type="hidden" th:field="*{price}">
								<div class="col-4 col-md-2">
									<span class="text-muted d-block">Fila</span>
									<strong th:text="*{seatRow}">A</strong>
								</div>

								<div class="col-4 col-md-2">
									<span class="text-muted d-block">Asiento</span>
									<strong th:text="*{seatNumber}">1</strong>
								</div>

								<div class="col-4 col-md-2">
									<span class="text-muted d-block">Precio</span>
									<strong>
										<span th:text="*{price}">0</span> EUR
									</strong>
								</div>
							</div>

							<div sec:authorize="hasRole('ADMIN')" class="mt-3">
								<label class="form-label form-label-sm" for="user">Usuario cliente</label>
								<select id="user" class="form-select form-select-sm" th:field="*{user}" required>
									<option value=""></option>
									<option th:each="user : ${users}"
									        th:value="${user.id}"
									        th:text="${user.id + ' - ' + user.username + ' - ' + user.email}">
									</option>
								</select>
							</div>
						</div>
					</div>
				</div>

				<div class="ticket">
					<div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
						<div>
							<p class="ticket-subtitle text-uppercase fw-bold mb-1">Combos</p>
							<h2 class="h5 fw-bold text-uppercase text-flux-dark mb-0">Añade tu favorito</h2>
						</div>
						<small class="text-muted">Pulsa otra vez para quitarlo</small>
					</div>

					<div class="row g-3">
						<div class="col-12 col-md-4">
							<button type="button"
							        class="combo-card ticket-combo w-100 text-start"
							        onclick="selectCombo(this, 8)">
								<img th:src="@{/images/combo1.png}" alt="Palomitas y bebida"
								     class="rounded img-fluid mb-2">
								<span>
                                    <strong>Combo clásico</strong>
                                    <small>Palomitas + Bebida</small>
                                </span>
								<b>8 EUR</b>
							</button>
						</div>

						<div class="col-12 col-md-4">
							<button type="button"
							        class="combo-card ticket-combo w-100 text-start"
							        onclick="selectCombo(this, 10)">
								<img th:src="@{/images/combo2.png}" alt="Palomitas, bebida y lacasitos"
								     class="rounded img-fluid mb-2">
								<span>
                                    <strong>Combo dulce</strong>
                                    <small>Palomitas + bebida + lacasitos</small>
                                </span>
								<b>10 EUR</b>
							</button>
						</div>

						<div class="col-12 col-md-4">
							<button type="button"
							        class="combo-card ticket-combo w-100 text-start"
							        onclick="selectCombo(this, 15)">
								<img th:src="@{/images/combo3.png}" alt="Hamburguesa, bebida y patatas"
								     class="rounded img-fluid mb-2">
								<span>
                                    <strong>Combo cena</strong>
                                    <small>Hamburguesa + bebida + patatas</small>
                                </span>
								<b>15 EUR</b>
							</button>
						</div>
					</div>
				</div>
			</div>

			<div class="col-12 col-lg-4">
				<div class="ticket position-sticky" style="top: 1rem;">
					<p class="ticket-subtitle text-uppercase fw-bold mb-1">Resumen</p>
					<h2 class="h5 fw-bold text-uppercase text-flux-dark mb-4">Pedido</h2>

					<div class="d-grid gap-3 small">
						<div class="d-flex justify-content-between gap-3">
							<span class="text-muted">Entrada</span>
							<strong id="resumenTicket">-</strong>
						</div>
						<div class="d-flex justify-content-between gap-3">
							<span class="text-muted">Combo</span>
							<strong id="resumenCombo">Sin combo</strong>
						</div>
						<hr class="ticket-hr my-0">
						<div class="d-flex justify-content-between align-items-end gap-3">
							<span class="fs-5 fw-bold text-flux-dark">Total</span>
							<span class="fs-3 fw-bold text-flux-dark" id="resumenTotal">-</span>
						</div>
					</div>

					<div class="d-grid gap-2 mt-4">
						<button type="submit" class="btn btn-primary">
							<i class="fa-solid fa-arrow-right me-2"></i>
							Avanzar
						</button>
						<a th:href="@{/tickets}" class="btn btn-outline-primary">
							Cancelar
						</a>
					</div>

					<p class="ticket-subtitle text-center mt-4 mb-0">VIVE EL CINE</p>
				</div>
			</div>
		</div>
	</form>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

<script>

    // Precio base del ticket
    const precioTicket = parseFloat(document.getElementById('price').value) || 0;
    document.getElementById('resumenTicket').textContent = precioTicket.toFixed(2) + ' €';
    document.getElementById('resumenTotal').textContent = precioTicket.toFixed(2) + ' €';

    function selectCombo(card, value) {
        const allCards = document.querySelectorAll('.combo-card');
        const hidden = document.getElementById('priceComboHidden');

        if (card.classList.contains('selected-combo')) {
            card.classList.remove('selected-combo');
            card.style.backgroundColor = '';
            card.style.borderColor = '';
            card.style.transform = '';
            hidden.value = '';
            document.getElementById('resumenCombo').textContent = 'Sin combo';
            document.getElementById('resumenTotal').textContent = precioTicket.toFixed(2) + ' €';
            return;
        }

        allCards.forEach(c => {
            c.classList.remove('selected-combo');
            c.style.backgroundColor = '';
            c.style.borderColor = '';
            c.style.transform = '';
        });

        card.classList.add('selected-combo');
        card.style.backgroundColor = '#d1e7dd';
        card.style.borderColor = '#198754';
        card.style.transform = 'scale(1.03)';
        hidden.value = value;

        const total = precioTicket + value;
        document.getElementById('resumenCombo').textContent = value.toFixed(2) + ' €';
        document.getElementById('resumenTotal').textContent = total.toFixed(2) + ' €';
    }
</script>

</body>
</html>
