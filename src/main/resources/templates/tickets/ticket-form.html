<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Formulario Ticket')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-4">
        <i class="fa-solid fa-ticket text-primary me-2"></i> Ticket seleccionado 😎
    </h1>

    <form th:action="@{/tickets}" method="post" th:object="${ticket}">
        <input type="hidden" th:field="*{id}">
<!--        <input type="hidden" id="priceComboHidden" th:field="*{priceCombo}">-->

        <!-- Datos del ticket compactos -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fa-solid fa-ticket me-2"></i>Datos del ticket</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label form-label-sm">Función</label>
                        <input type="text" class="form-control form-control-sm" readonly
                               th:value="${ticket.session != null ? ticket.session.movie.title + ' - '
                               + ticket.session.language + ' - ' + #temporals.format(ticket.session.startTime,
                               'dd/MM/yyyy HH:mm') : ''}">
                        <input type="hidden" th:field="*{session.id}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label form-label-sm">Fila</label>
                        <input type="text" class="form-control form-control-sm"
                               th:field="*{seatRow}" placeholder="A, B, C..." required readonly>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label form-label-sm">Asiento</label>
                        <input type="number" class="form-control form-control-sm"
                               th:field="*{seatNumber}" min="1" required readonly>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label form-label-sm">Precio</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control form-control-sm"
                                   th:field="*{price}" step="0.1" min="0" readonly>
                            <span class="input-group-text">€</span>
                        </div>
                    </div>

                    <!-- Usuario (solo admin) -->
                    <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                        <label class="form-label form-label-sm">Usuario cliente</label>
                        <select class="form-select form-select-sm" th:field="*{user}" required>
                            <option value=""></option>
                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.id + ' - ' + user.username + ' - ' + user.email}">
                            </option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Combos de comida -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0"><i class="fa-solid fa-popcorn me-2"></i>Agrega tu combo favorito (Opcional)🍿🥤</h5>
            </div>
            <div class="card-body">
                <p class="text-muted small mb-3">Selecciona un combo para añadirlo a tu ticket.</p>
                <div class="row g-3 justify-content-center">

                    <!-- Sin combo -->
<!--                    <div class="col-md-3">-->
<!--                        <label class="w-100 h-100">-->
<!--                            <input type="radio" name="priceCombo" value="" class="d-none" checked>-->
<!--                            <div class="combo-card text-center p-3 border rounded-3 h-100"-->
<!--                                 style="cursor:pointer;">-->
<!--                                <div style="font-size: 3rem;">❌</div>-->
<!--                                <h6 class="fw-bold mt-2">Sin combo</h6>-->
<!--                                <p class="text-muted small mb-2">Solo el ticket</p>-->
<!--                                <span class="badge bg-secondary fs-6">0 €</span>-->
<!--                            </div>-->
<!--                        </label>-->
<!--                    </div>-->

                    <!-- Combo 1 -->
                    <div class="col-md-3">
                        <label class="w-100 h-100">
                            <input type="radio" name="priceCombo" value="8" class="d-none">
                            <div class="combo-card text-center p-3 border rounded-3 h-100"
                                 style="cursor:pointer;">
                                <img th:src="@{/images/combo1.png}" alt="Palomitas y bebida"
                                     class="img-fluid rounded mb-2" style="max-height: 150px; object-fit: cover; width: 100%;">
                                <h6 class="fw-bold mt-2">Palomitas + Bebida</h6>
                                <p class="text-muted small mb-2">El clásico del cine</p>
                                <span class="badge bg-success fs-6">8 €</span>
                            </div>
                        </label>
                    </div>

                    <!-- Combo 2 -->
                    <div class="col-md-3">
                        <label class="w-100 h-100">
                            <input type="radio" name="priceCombo" value="10" class="d-none">
                            <div class="combo-card text-center p-3 border rounded-3 h-100"
                                 style="cursor:pointer;">
                                <img th:src="@{/images/combo2.png}" alt="Palomitas, bebida y lacasitos"
                                     class="img-fluid rounded mb-2" style="max-height: 150px; object-fit: cover; width: 100%;">
                                <h6 class="fw-bold mt-2">Palomitas + Bebida + Lacasitos</h6>
                                <p class="text-muted small mb-2">Para los más golosos</p>
                                <span class="badge bg-success fs-6">10 €</span>
                            </div>
                        </label>
                    </div>

                    <!-- Combo 3 -->
                    <div class="col-md-3">
                        <label class="w-100 h-100">
                            <input type="radio" name="priceCombo" value="15" class="d-none">
                            <div class="combo-card text-center p-3 border rounded-3 h-100"
                                 style="cursor:pointer;">
                                <img th:src="@{/images/combo3.png}" alt="Hamburguesa, bebida y patatas"
                                     class="img-fluid rounded mb-2" style="max-height: 150px; object-fit: cover; width: 100%;">
                                <h6 class="fw-bold mt-2">Hamburguesa + Bebida + Patatas</h6>
                                <p class="text-muted small mb-2">¿Con hambre? ¡Ni loc@!</p>
                                <span class="badge bg-success fs-6">15 €</span>
                            </div>
                        </label>
                    </div>

                </div>
            </div>
        </div>


        <!-- Resumen del precio -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="fa-solid fa-euro-sign me-2"></i>Resumen del pedido</h5>
            </div>
            <div class="card-body">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between">
                        <span class="text-muted">Precio ticket</span>
                        <span class="fw-semibold" th:text="|${#numbers.formatDecimal(ticket.price, 1, 2)} €|"></span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <span class="text-muted">Combo seleccionado</span>
                        <span class="fw-semibold text-muted">Se calculará al avanzar</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between fs-5">
                        <span class="fw-bold">Precio base</span>
                        <span class="fw-bold text-success" th:text="|${#numbers.formatDecimal(ticket.price, 1, 2)} €|"></span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk me-1"></i>Siguiente
            </button>
            <a th:href="@{/tickets}" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
