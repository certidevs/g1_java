<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Detalle Película')}"></head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{layout/navbar :: navbar}"></header>

<main class="container flex-grow-1 mb-3">
	<div class="row mb-5">
		<div class="col-md-9">
			<div class="card shadow-sm">
				<div class="row g-0">
					<div class="col-md-8">
						<div class="card-body m-4">
							<div class="d-flex align-items-center gap-2">
								<h5 class="card-title mb-3 fs-1" th:text="${movie.title}">Título</h5>
								<span th:text="'(' + ${movie.duration} + 'min)'">0</span>
							</div>
							<div class="card-text">
								<p class="fw-bold mb-1">
									Dirigida por:
									<span th:text="${movie.director != null ? movie.director.name : 'Sin director'}"
									      class="fw-normal" ></span>
								</p>
								<p class="fw-bold mb-1">
									Año de lanzamiento:
									<span class="fw-normal" th:text="${movie.releaseDate}"></span>
								</p>
								<p class="fw-bold mb-1">
									Edad mínima:
									<span class="fw-normal" th:text="${movie.minAge.label}"></span>
								</p>
							</div>
							<div class="mb-2">
								<span class="badge bg-info text-black">
	                                <span th:each="g : ${movie.genreSet}"
	                                      th:text="${g.label} + ' '">
									</span>
	                            </span>
							</div>
							<p class="card-text" th:text="${movie.sinopsis}"></p>
							<a sec:authorize="hasRole('ADMIN')" th:href="@{/movies/edit/{id}(id=${movie.id})}"
							   class="btn btn-success btn-sm">
								<i class="fa-solid fa-pencil me-1"></i> Editar
							</a>
							<a sec:authorize="hasRole('ADMIN')" th:href="@{/movies/deactivate/{id}(id=${movie.id})}"
							   class="btn btn-warning btn-sm"
							   onclick="return confirm('¿Estás seguro de que querés desactivar esta función?')">
								<i class="fa-solid fa-ban me-1"></i> Desactivar
							</a>
						</div>
					</div>

					<div class="col-md-4">
						<div class="p-4">
							<img th:src="${movie.getImageUrl}" class="rounded img-fluid mb-3" alt="Film card">
							<div class="d-flex justify-content-end">
								<form sec:authorize="isAuthenticated()" th:action="@{/favorites/toggle}" method="post">
									<input type="hidden" name="type" th:value="Movie">
									<input type="hidden" name="targetId" th:value="${movie.id}">
									<input type="hidden" name="redirectUrl" th:value="@{/movie/{id}(id=${movie.id})}">
									<button th:classappend="${favoriteMovieIds.contains(movie.id)} ?
									'btn-danger' : 'btn-outline-danger'" class="btn btn-sm" type="submit">
										<i th:class="${favoriteMovieIds.contains(movie.id)} ?
                                        'fa-solid fa-heart' : 'fa-regular fa-heart'"></i>
										Guardar favorito
									</button>
								</form>
							</div>
						</div>
						<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
					</div>
				</div>
				<div class="row">
					<div class="col">
						<div class="d-flex justify-content-center mb-4">
							<a class="btn btn-primary px-5" data-bs-toggle="collapse" href="#collapseExample" role="button"
							   aria-expanded="false" aria-controls="collapseExample">
								Ver trailer
							</a>
						</div>
						<div class="collapse" id="collapseExample">
							<div class="d-flex justify-content-center m-4 p-3">
								<iframe width="560" height="315" th:src="${movie.trailerUrl}" allowfullscreen
								        referrerpolicy="strict-origin-when-cross-origin" title="YouTube video player"
								        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
							        picture-in-picture; web-share" class="rounded">
								</iframe>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-3">
			<form th:action="@{/movies/{id}(id=${movie.id})}" method="get">
				<label class="form-label fs-4 fw-bold" for="date">Selecciona fecha</label>
				<div class="d-flex align-items-center mb-3">
					<select class="form-select me-2" id="date" name="date" required>
						<option
								th:each="availableDate : ${availableDates}"
								th:value="${availableDate}"
								th:text="${availableDate}"
								th:selected="${selectedDate != null and selectedDate == availableDate}">
						</option>
					</select>
					<button type="submit" class="btn btn-primary">Buscar</button>
				</div>
			</form>
			<div class="card">
				<div class="card-body m-2">
					<h5 class="card-title mb-3">Sesiones</h5>
					<div class="card" th:if="${projections != null}">
						<div class="card-body">
							<div th:if="${#lists.isEmpty(projections)}" class="text-muted">
								No hay sesiones disponibles
							</div>
							<div th:each="entry : ${projectionsByRoom}" class="mb-3">
								<h6 class="fw-bold" th:text="${entry.key.name}"></h6>
								<div class="d-flex flex-wrap gap-2">
									<a th:each="projection : ${entry.value}"
									   th:href="@{/sessions/{id}(id=${projection.id})}"
									   class="btn btn-outline-primary btn-sm"
									   th:text="${#temporals.format(projection.startTime, 'HH:mm')}">
									</a>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

		</div>
	</div>
	<!-- Opiniones -->
	<div class="d-flex align-items-center mb-3">
		<h2 class="fs-3 fw-bold mb-0">
			<i class="fa-regular fa-comments text-primary me-2"></i>
			Opiniones de nuestros usuarios
		</h2>
		<a sec:authorize="isAuthenticated()" th:href="@{/reviews/new(movieId=${movie.id})}"
		   class="btn btn-success ms-3">
			<i class="fa-solid fa-plus"></i>
			Escribir reseña
		</a>
	</div>

	<div th:if="${reviews.isEmpty()}" class="alert alert-light border">
		<i class="fa-regular fa-face-smile me-1"></i>
		Nadie ha comentado todavía, sé el primero en escribir una opinión.
	</div>
	<div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${reviews.isEmpty()}">
		<div class="col" th:each="review : ${reviews}">
			<div class="card h-100 shadow-sm">
				<div class="card-body">
					<h5 class="card-title"
					    th:text="${review.title}">Título</h5>
					<p class="card-text" th:text="${review.description}">Descripción</p>
					<span class="badge bg-warning text-dark">
						<i class="fa-solid fa-star me-1"></i>
						<span th:text="${review.rating + ' / 5'}"></span>
					</span>
				</div>
				<div class="card-footer text-muted small bg-transparent">
					<i class="fa-regular fa-calendar me-1"></i>
					<span th:text="${review.creationDate}"></span>
				</div>
			</div>
		</div>
	</div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
