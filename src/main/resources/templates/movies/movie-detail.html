<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle Película')}"></head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{layout/navbar :: navbar}"></header>

<main class="container flex-grow-1 mb-3">
	<div class="row">
		<div class="col-md-9">
			<div class="card shadow-sm">
				<div class="row g-0">
					<div class="col-md-8">
						<div class="card-body m-4">
							<div class="d-flex align-items-center gap-2">
								<h5 class="card-title mb-3 fs-1" th:text="${movie.title}">Título</h5>
								<span th:text="'(' + ${movie.duration} + 'min)'">0</span>
							</div>
							<div class="card-text">
								<p class="fw-bold mb-1">
									Dirigida por:
									<span th:text="${movie.director != null ? movie.director.name : 'Sin director'}"
									      class="fw-normal" ></span>
								</p>
								<p class="fw-bold mb-1">
									Año de lanzamiento:
									<span class="fw-normal" th:text="${movie.releaseYear}"></span>
								</p>
								<p class="fw-bold mb-1">
									Edad mínima:
									<span class="fw-normal" th:text="${movie.minAge.label}"></span>
								</p>
							</div>
							<div class="mb-2">
								<span class="badge bg-info text-black">
	                                <span th:each="g : ${movie.genreSet}"
	                                      th:text="${g.label} + ' '">
									</span>
	                            </span>
							</div>
							<p class="card-text" th:text="${movie.sinopsis}"></p>
						</div>
					</div>

					<div class="col-md-4">
						<div class="p-4">
							<img th:src="${movie.getImageUrl}" class="rounded img-fluid" alt="Film card">
						</div>
					</div>
				</div>
				<div class="row">
					<div class="col">
						<div class="d-flex justify-content-center mb-4">
							<a class="btn btn-primary px-5" data-bs-toggle="collapse" href="#collapseExample" role="button"
							   aria-expanded="false" aria-controls="collapseExample">
								Ver trailer
							</a>
						</div>
						<div class="collapse" id="collapseExample">
							<div class="d-flex justify-content-center m-4 p-3">
								<iframe width="560" height="315" th:src="${movie.trailerUrl}" allowfullscreen
								        referrerpolicy="strict-origin-when-cross-origin" title="YouTube video player"
								        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
							        picture-in-picture; web-share" class="rounded">
								</iframe>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-3">
			<form th:action="@{/movies/{id}(id=${movie.id})}" method="get">
				<label class="form-label fs-4 fw-bold" for="date">Selecciona fecha</label>
				<div class="d-flex align-items-center mb-3">
					<select class="form-select me-2" id="date" name="date" required>
						<option value=""></option>
						<option
								th:each="availableDate : ${availableDates}"
								th:value="${availableDate}"
								th:text="${availableDate}"
								th:selected="${selectedDate != null and selectedDate == availableDate}">
						</option>
					</select>
					<button type="submit" class="btn btn-primary">Buscar</button>
				</div>
			</form>
			<div class="card">
				<div class="card-body m-2">
					<h5 class="card-title mb-3">Sesiones</h5>
					<div class="card" th:if="${projections != null}">
						<div class="card-body">
							<div th:if="${#lists.isEmpty(projections)}" class="text-muted">
								No hay sesiones disponibles
							</div>
							<div th:each="entry : ${projectionsByRoom}" class="mb-3">
								<h6 class="fw-bold" th:text="${entry.key.name}"></h6>
								<div class="d-flex flex-wrap gap-2">
									<a th:each="projection : ${entry.value}"
									   th:href="@{/sessions/{id}(id=${projection.id})}"
									   class="btn btn-outline-primary btn-sm"
									   th:text="${#temporals.format(projection.startTime, 'HH:mm')}">
									</a>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

		</div>
	</div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
