<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Cine')}"></head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{layout/navbar :: navbar}"></header>

<main class="container flex-grow-1">
	<div sec:authorize="hasRole('ADMIN')" class="d-flex justify-content-between align-items-center mb-4">
		<p class="fs-3 fw-bold mb-0">¡Quieto todo el mundo! Ha llegado el admin... 👀</p>
		<a th:href="@{/movies/new}" class="btn btn-primary align-self-end">
			<i class="fa-solid fa-plus"></i>
			Crear película
		</a>
	</div>

	<ul class="nav nav-tabs rounded-top bg-danger pt-3 px-3 border-bottom-0">
		<li class="nav-item">
			<a class="nav-link"
			   th:classappend="${section == 'BILLBOARD'} ? 'active bg-primary-subtle' : 'text-white'"
			   th:href="@{/movies/billboard}">Cartelera</a>
		</li>
		<li class="nav-item">
			<a class="nav-link"
			   th:classappend="${section == 'FLUX'} ? 'active bg-primary-subtle' : 'text-white'"
			   th:href="@{/movies/flux}">Sala flux</a>
		</li>
	</ul>

	<div class="card rounded-top-0 border-top-0">
		<div class="mb-4">
			<nav class="navbar navbar-expand-lg bg-primary-subtle">
				<div class="container-fluid">
					<a class="nav-link" th:href="@{/movies(section=${section})}">
						<h1 class="fs-5 mb-0">Volver a todas las películas</h1>
					</a>
					<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarSupportedContent">
						<ul class="navbar-nav ms-auto me-2 mb-2 mb-lg-0">
							<li class="nav-item dropdown">
								<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
									Género
								</a>
								<ul class="dropdown-menu">
									<li th:each="genre : ${genres}">
										<a class="dropdown-item"
										   th:href="@{/movies(genre=${genre.name()})}"
										   th:text="${genre.label}">
										</a>
									</li>
								</ul>
							</li>
							<li class="nav-item dropdown">
								<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
									Estado
								</a>
								<ul class="dropdown-menu">
									<li th:each="movieStatus : ${moviesStatus}">
										<a class="dropdown-item"
										   th:href="@{/movies(movieStatus=${movieStatus.name()})}"
										   th:text="${movieStatus.label}">
										</a>
									</li>
								</ul>
							</li>
							<li class="nav-item dropdown">
								<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
									Edad mínima
								</a>
								<ul class="dropdown-menu">
									<li th:each="minAge : ${minAges}">
										<a class="dropdown-item"
										   th:href="@{/movies(minAge=${minAge.name()})}"
										   th:text="${minAge.label}">
										</a>
									</li>
								</ul>
							</li>
						</ul>
					</div>
					<form class="d-flex" role="search">
						<input type="search" name="title" class="form-control form-control-sm me-2"
						       placeholder="Busca por título..." th:value="${param.title}">
						<button type="submit" class="btn btn-primary btn-sm">
							<i class="fa-solid fa-magnifying-glass"></i>
						</button>
					</form>
				</div>
			</nav>
		</div>
		<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 p-3 g-3">
			<div class="col" th:each="movie : ${movies}">
				<div class="card h-100 shadow-sm">
					<div>
						<img style="height: 24rem" th:src="${movie.getImageUrl}" class="card-img-top" alt="Film card">
					</div>
					<div class="card-body">
						<h5 class="card-title mb-3" th:text="${movie.title}">Nombre</h5>
						<div class="card-footer bg-transparent border-0 pt-0">
							<a th:href="@{/movies/{id}(id=${movie.id},
							date=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')})}"
							   class="btn btn-outline-primary btn-sm w-100 mb-2">
								<i class="fa-regular fa-eye me-1"></i>Ver película
							</a>
							<a sec:authorize="hasRole('ADMIN')" th:href="@{/movies/edit/{id}(id=${movie.id})}"
							   class="btn btn-outline-primary btn-sm w-100 mb-2">
								<i class="fa-solid fa-pencil me-1"></i>Editar
							</a>
							<a sec:authorize="hasRole('ADMIN')" th:href="@{/movies/deactivate/{id}(id=${movie.id})}"
							   class="btn btn-outline-danger btn-sm w-100"
							   onclick="return confirm('¿Estás seguro de que querés desactivar esta función?')">
								<i class="fa-solid fa-ban me-1"></i> Desactivar
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
