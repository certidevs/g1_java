<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('Cine')}"></head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{layout/navbar :: navbar}"></header>

<main class="container flex-grow-1">
	<div class="mb-4">
		<div sec:authorize="hasRole('ADMIN')" class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
			<div>
				<h2 class="mb-0 fw-bold">Películas</h2>
				<small class="text-muted">
					Gestión y catálogo
				</small>
			</div>
			<div class="d-flex flex-wrap gap-2">
				<a th:href="@{/movies/inactive}" class="btn btn-outline-primary">
					<i class="fa-solid fa-ban me-2"></i>
					Desactivadas
				</a>
				<a th:href="@{/movies/new}" class="btn btn-primary">
					<i class="fa-solid fa-plus me-2"></i>
					Crear película
				</a>
			</div>
		</div>
		<div class="movies-toolbar">
			<hr class="my-4">
			<div class="d-flex flex-column flex-lg-row justify-content-between gap-3">
				<div class="d-flex flex-wrap gap-2">
					<div class="dropdown my-auto">
						<a class="text-primary text-decoration-none dropdown-toggle" type="button" data-bs-toggle="dropdown">
							Género
						</a>
						<ul class="dropdown-menu">
							<li th:each="genre : ${genres}">
								<a class="dropdown-item" th:href="@{/movies(section=${section}, genre=${genre.name()})}"
								   th:text="${genre.label}">
								</a>
							</li>
						</ul>
					</div>
					<div class="dropdown my-auto">
						<a class="text-primary text-decoration-none dropdown-toggle" type="button" data-bs-toggle="dropdown">
							Estado
						</a>
						<ul class="dropdown-menu" th:if="${section=='BILLBOARD'}">
							<li>
								<a th:href="@{/movies(section='BILLBOARD', movieStatus='COMING_SOON')}"
								   class="dropdown-item">Próximamente</a>
							</li>
							<li>
								<a th:href="@{/movies(section='BILLBOARD', movieStatus='PRE_SALES')}"
								   class="dropdown-item">Venta anticipada</a>
							</li>
							<li>
								<a th:href="@{/movies(section='BILLBOARD', movieStatus='NOW_SHOWING')}"
								   class="dropdown-item">En cartelera</a>
							</li>
							<li>
								<a th:href="@{/movies(section='BILLBOARD', movieStatus='LAST_DAYS')}"
								   class="dropdown-item">Últimos días</a>
							</li>
							<li>
								<a th:href="@{/movies(section='BILLBOARD', movieStatus='FINISHED')}"
								   class="dropdown-item">Ya no disponible</a>
							</li>
						</ul>
						<ul class="dropdown-menu" th:if="${section=='FLUX'}">
							<li>
								<a th:href="@{/movies(section='FLUX', movieStatus='IN_VOTING')}"
								   class="dropdown-item">En votación</a>
							</li>
							<li>
								<a th:href="@{/movies(section='FLUX', movieStatus='VOTED')}"
								   class="dropdown-item">Votado</a>
							</li>
						</ul>
					</div>
					<div class="dropdown my-auto">
						<a class="text-primary text-decoration-none dropdown-toggle" type="button" data-bs-toggle="dropdown">
							Edad mínima
						</a>
						<ul class="dropdown-menu">
							<li th:each="minAge : ${minAges}">
								<a class="dropdown-item"
								   th:href="@{/movies(section=${section}, minAge=${minAge.name()})}"
								   th:text="${minAge.label}">
								</a>
							</li>
						</ul>
					</div>
					<a th:if="${section == 'FLUX'}" th:href="@{/movies/billboard}" class="ms-2 btn btn-primary">
						Volver a la cartelera
					</a>
					<a th:unless="${section == 'FLUX'}" th:href="@{/movies/flux}" class="ms-2 btn btn-secondary">
						Ver emisiones Flux
					</a>
					<a th:if="${section == 'FLUX' and (param.genre != null or param.movieStatus != null or param.minAge != null)}"
					   th:href="@{/movies/flux}" class="ms-2 btn btn-secondary">
						Quitar filtros
					</a>

					<a th:if="${section != 'FLUX' and (param.genre != null or param.movieStatus != null or param.minAge != null)}"
					   th:href="@{/movies/billboard}" class="ms-2 btn btn-primary">
						Quitar filtros
					</a>
				</div>
				<form class="d-flex gap-2" th:action="@{/movies}">
					<input type="search" name="title" class="form-control" placeholder="Buscar película..."
					       th:value="${param.title}" list="movies">
					<datalist id="movies">
						<option th:each="movie : ${movies}"
						        th:value="${movie.title}">
						</option>
					</datalist>
					<input type="hidden" name="section" th:value="${section}">
					<button type="submit" class="btn btn-primary">
						<i class="fa-solid fa-magnifying-glass"></i>
					</button>
				</form>
			</div>
		</div>
	</div>
	<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
		<div class="col" th:each="movie : ${movies}">
			<div th:replace="~{fragments/movie-card :: movieCard(${movie}, ${favoriteMovieIds})}"></div>
		</div>
	</div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
