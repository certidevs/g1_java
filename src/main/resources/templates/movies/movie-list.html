<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Cine')}"></head>
<body class="d-flex flex-column min-vh-100">

<header th:replace="~{layout/navbar :: navbar}"></header>

<main class="container flex-grow-1">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h1 class="mb-0" th:text="${title}">Películas</h1>
		<span class="badge bg-secondary fs-6" th:text="|${numMovies} resultados|">0 resultados</span>
	</div>

	<a th:href="@{/movies/new}" class="btn btn-primary btn-sm mb-2">
		<i class="fa-solid fa-plus"></i>
		Crear película
	</a>

	<div class="mb-3">
		<h5>Filtros rápidos</h5>
		<a th:href="@{/movies}" class="btn btn-sm btn-primary">Todos</a>
		<a th:href="@{/movies(directorName='Frankel')}" class="btn btn-sm btn-secondary">Películas de Frankel</a>
		<a th:href="@{/movies(genre='COMEDY')}" class="btn btn-sm btn-secondary">Películas cómicas</a>
		<a th:href="@{/movies(genre='DRAMA')}" class="btn btn-sm btn-secondary">Películas dramáticas</a>
		<a th:href="@{/movies(minAge=ALL)}" class="btn btn-sm btn-info">Todas las audiencias</a>
		<a th:href="@{/movies(minAge=AGE_12)}" class="btn btn-sm btn-info">+12</a>
		<a th:href="@{/movies(releaseYear=2026)}" class="btn btn-sm btn-info">2026</a>
	</div>

	<div class="mb-3">
		<h5>Búsqueda avanzada</h5>
		<form th:action="@{/movies}" method="get" class="row align-items-end">
			<div class="col-auto">
				<label class="form-label form-label-sm">Título</label>
				<input type="text" name="title" class="form-control form-control-sm"
				       placeholder="Busca por título..." th:value="${param.title}">
			</div>
			<div class="col-auto">
				<label class="form-label form-label-sm">Rango edad</label>

				<select name="minAge" class="form-select form-select-sm">

					<option value="">Restricción por edad</option>

					<option th:each="minAge : ${minAges}"
					        th:value="${minAge.name()}"
					        th:text="${minAge.label}"
					        th:selected="${param.minAge != null and param.minAge[0] == minAge.name()}">
					</option>

				</select>
			</div>
			<div class="col-auto">
				<label class="form-label form-label-sm">Géneros</label>

				<select name="genre" class="form-select form-select-sm">

					<option value="">No seleccionado</option>

					<option th:each="genre : ${genres}"
					        th:value="${genre.name()}"
					        th:text="${genre.label}"
					        th:selected="${param.genre != null and param.genre[0] == genre.name()}">
					</option>

				</select>
			</div>
			<div class="col-auto">
				<button type="submit" class="btn btn-primary btn-sm">
					<i class="fa-solid fa-magnifying-glass"></i>
					Buscar
				</button>
				<a th:href="@{/movies}" class="btn btn-danger btn-sm">
					<i class="fa-solid fa-broom"></i>
					Limpiar filtros
				</a>
			</div>
		</form>
	</div>

	<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-3">
		<div class="col" th:each="movie : ${movies}">
			<div class="card h-100 shadow-sm">
				<div>
					<img style="height: 24rem" th:src="${movie.getImageUrl}" class="card-img-top" alt="Film card">
				</div>
				<div class="card-body">
					<h5 class="card-title" th:text="${movie.title}">Nombre</h5>
					<div class="card-footer bg-transparent border-0 pt-0">
						<a th:href="@{/movies/{id}(id=${movie.id})}"
						   class="btn btn-outline-primary btn-sm w-100">
							<i class="fa-regular fa-eye me-1"></i>Ver película
						</a>
						<a th:href="@{/movies/edit/{id}(id=${movie.id})}"
						   class="btn btn-outline-primary btn-sm w-100">
							<i class="fa-solid fa-pencil me-1"></i>Editar
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
