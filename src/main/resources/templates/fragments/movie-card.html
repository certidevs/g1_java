<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<body>

<div th:fragment="movieCard(movie, favoriteMovieIds)" class="ticket h-100 position-relative overflow-hidden">
	<div class="ribbon position-absolute"
	     th:classappend="${movie.movieStatus.name() == 'NEW_RELEASE'} ? 'ribbon-danger' :
                    (${movie.movieStatus.name() == 'COMING_SOON'} ? 'ribbon-secondary' :
                    (${movie.movieStatus.name() == 'PRE_SALES'} ? 'ribbon-warning' :
                    (${movie.movieStatus.name() == 'LAST_DAYS'} ? 'ribbon-warning' :
                    (${movie.movieStatus.name() == 'FINISHED'} ? 'ribbon-dark' : 'ribbon-success'))))"
	     th:text="${movie.movieStatus.label}">
	</div>
	<form sec:authorize="isAuthenticated()" th:action="@{/favorites/toggle}" method="post"
	      class="position-absolute top-0 end-0 m-3 z-3">
		<input type="hidden" name="type" th:value="MOVIE">
		<input type="hidden" name="targetId" th:value="${movie.id}">
		<input type="hidden" name="redirectUrl" th:value="@{/movies}">
		<button class="btn btn-light rounded-circle shadow-sm p-2" type="submit">
			<i class="fa-heart text-primary fs-5"
			   th:classappend="${favoriteMovieIds != null and favoriteMovieIds.contains(movie.id)} ? 'fa-solid' : 'fa-regular'">
			</i>
		</button>
	</form>
	<div class="ratio mb-3" style="--bs-aspect-ratio:140%;">
		<img th:src="${movie.imageUrl}" class="object-fit-cover rounded" alt="Poster">
	</div>
	<p class="text-uppercase fw-bold small text-primary mb-1" th:text="${'★ ' + movie.section.label + ' ★'}"></p>
	<h5 class="fw-bold text-uppercase mb-3" th:text="${movie.title}">Nombre</h5>
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div class="d-flex align-items-center gap-2">
			<i class="fa-solid fa-star text-secondary"></i>
			<span class="fw-bold"
			      th:text="${movie.avgRating != null ? #numbers.formatDecimal(movie.avgRating, 1, 1) : '-'}">
                0.0
            </span>
			<small class="text-muted">(<span th:text="${movie.countReviews}">0</span>)</small>
		</div>
	</div>
	<span class="badge text-bg-dark" th:text="${movie.minAge.label}"></span>
	<span class="badge text-bg-primary me-1"
	      th:each="genre : ${movie.genreSet}"
	      th:text="${genre.label}">
	</span>
	<hr>
	<div class="d-grid gap-2">
		<a th:href="@{/movies/{id}(id=${movie.id}, date=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')})}"
		   class="btn btn-primary">
			<i class="fa-regular fa-eye me-2"></i>
			Ver película
		</a>
		<a sec:authorize="hasRole('ADMIN')"
		   th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-outline-accent">
			<i class="fa-solid fa-pencil me-2"></i>
			Editar
		</a>
		<a sec:authorize="hasRole('ADMIN')"
		   th:href="@{/movies/deactivate/{id}(id=${movie.id})}" class="btn btn-outline-danger">
			<i class="fa-solid fa-ban me-2"></i>
			Desactivar
		</a>
	</div>
	<hr class="mt-3">
	<p class="text-center mb-0 small text-primary">★ VIVE EL CINE ★</p>
</div>

</body>
</html>
