<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Listado Salas')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="${title}">Salas</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numRooms} resultados|"></span>
    </div>

    <a th:href="@{/rooms/new}" class="btn btn-primary btn-sm mb-2">
        <i class="fa-solid fa-plus"></i>
        Crear sala
    </a>

    <div class="mb-3">
        <h5>Filtros rápidos</h5>
        <a th:href="@{/rooms}" class="btn btn-sm btn-primary">Todos</a>
        <a th:href="@{/rooms/screentype/IMAX}" class="btn btn-sm btn-secondary">Pantalla 2D</a>
        <a th:href="@{/rooms/screentype/THREE_D}" class="btn btn-sm btn-secondary">Pantalla 3D</a>
        <a th:href="@{/rooms/capacity/30}" class="btn btn-sm btn-success">Más 30 butacas</a>
        <a th:href="@{/rooms/capacity/50}" class="btn btn-sm btn-success">Más 50 butacas</a>
        <a th:href="@{/rooms(title='sala')}" class="btn btn-sm btn-warning">Sala</a>
        <a th:href="@{/rooms(title='VIP')}" class="btn btn-sm btn-warning">VIP</a>
    </div>

    <div class="mb-3">
        <h5>Búsqueda avanzada</h5>
        <form th:action="@{/rooms}" method="get" class="row align-items-end">

            <!-- Filtro por título -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Título</label>
                <input type="text" name="title" class="form-control form-control-sm"
                       placeholder="Busca por título..." th:value="${param.title}">
            </div>

            <!-- Filtro por capacidad -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Capacidad mín.</label>
                <input type="number" min="10" step="5" name="capacity"
                       class="form-control form-control-sm" th:value="${param.capacity}">
            </div>

            <!-- Filtro por precio -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Precio por pantalla (€)</label>
                <input type="number" min="0" step="0.01" name="price"
                class="form-control form-control-sm" th:value="${param.price}">
            </div>

            <!-- Filtro por screenType con selector -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Tipo pantalla</label>
                <select name="screenType" class="form-select form-select-sm">
                    <option value="" th:selected="${param.screenType == null || param.screenType == ''}">Todas</option>
                    <option value="STANDARD" th:selected="${param.screenType == 'STANDARD'}">Estándar</option>
                    <option value="IMAX" th:selected="${param.screenType == 'IMAX'}">2D</option>
                    <option value="THREE_D" th:selected="${param.screenType == 'THREE_D'}">3D</option>
                    <option value="VIP" th:selected="${param.screenType == 'VIP'}">VIP</option>
                </select>

            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </button>
                <a th:href="@{/rooms}" class="btn btn-danger btn-sm">
                    <i class="fa-solid fa-broom"></i>
                    Limpiar filtros
                </a>
            </div>

        </form>

    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="room : ${rooms}">
            <div class="card card-room h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${room.name}">Nombre de la sala</h5>

                    <p class="card-text">
                        <strong>Capacidad:</strong> <span th:text="${room.capacity}"></span> butacas
                    </p>

                    <p class="card-text">
                        <strong>Precio:</strong> <span th:text="${#numbers.formatDecimal(room.price, 1, 2)}"></span> €
                    </p>

                    <p class="card-text">
                        <strong>Tipo de pantalla:</strong> <span th:text="${room.screentype.label}">STANDARD</span>
                    </p>

                    <div class="card-footer bg-transparent border-0 pt-0">

                        <!-- Botón de Ver sala que lleva al room-detail.html -->
                        <a th:href="@{/rooms/{id}(id=${room.id})}"
                           class="btn btn-outline-primary btn-sm w-100 mt-2">
                            <i class="fa-regular fa-eye me-1"></i> Ver
                        </a>

                        <!-- Botón de Editar sala -->
                        <a th:href="@{/rooms/edit/{id}(id=${room.id})}"
                           class="btn btn-success btn-sm w-100 mt-2">
                            <i class="fa-solid fa-pencil me-1"></i> Editar
                        </a>

                        <!-- Botón de Desactivar sala -->
                        <a th:href="@{/rooms/deactivate/{id}(id=${room.id})}"
                           class="btn btn-warning btn-sm w-100 mt-2">
                            <i class="fa-solid fa-ban me-1"></i> Desactivar
                        </a>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
