<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Detalle Sala')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <h1 th:text="${room.name}">Nombre de la sala</h1>
        <a th:href="@{/rooms}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver a salas
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Detalles de la sala</h5>
            <p class="card-text">
                <strong>ID:</strong> <span th:text="${room.id}">0</span>
            </p>
            <p class="card-text">
                <strong>Nombre:</strong> <span th:text="${room.name}">Sala</span>
            </p>
            <p class="card-text">
                <strong>Capacidad:</strong> <span th:text="${room.capacity}">0</span> butacas
            </p>
            <p class="card-text">
                <strong>Tipo de pantalla:</strong> <span th:text="${room.screentype.label}">STANDARD</span>
            </p>
        </div>
    </div>

    <a th:href="@{/rooms/edit/{id}(id=${room.id})}"
       class="btn btn-success btn-sm mt-2">
        <i class="fa-solid fa-pencil me-1"></i> Editar sala
    </a>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
