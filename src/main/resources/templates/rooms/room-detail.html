<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/head :: head('Detalle Sala')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <h1 th:text="${room.name}">Nombre de la sala</h1>
        <a th:href="@{/rooms}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver a salas
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Detalles de la sala</h5>
            <p class="card-text">
                <strong>ID:</strong> <span th:text="${room.id}">0</span>
            </p>
            <p class="card-text">
                <strong>Nombre:</strong> <span th:text="${room.name}">Sala</span>
            </p>
            <p class="card-text">
                <strong>Capacidad:</strong> <span th:text="${room.capacity}">0</span> butacas
            </p>
            <p class="card-text">
                <strong>Precio:</strong> <span class="fw-bold text-success"
                                               th:text="|${#numbers.formatDecimal(room.price, 1, 2)} €|">0,00 €</span>
            </p>
            <p class="card-text">
                <strong>Tipo de pantalla:</strong> <span th:text="${room.screentype.label}">STANDARD</span>
            </p>
        </div>
    </div>

    <a sec:authorize="hasRole('ADMIN')"  th:href="@{/rooms/edit/{id}(id=${room.id})}"
       class="btn btn-success btn-sm mt-2">
        <i class="fa-solid fa-pencil me-1"></i> Editar
    </a>

    <a sec:authorize="hasRole('ADMIN')"  th:href="@{/rooms/deactivate/{id}(id=${room.id})}"
       class="btn btn-warning btn-sm mt-2">
        <i class="fa-solid fa-ban me-1"></i> Desactivar
    </a>

    <!-- TODO mostrar sessions asociadas a esta Room  -->
    <h2 class="mt-3">Próximas sesiones en esa sala</h2>

    <div class="card shadow-sm" th:if="${sessions != null and !sessions.isEmpty()}">
        <div class="card-body">

            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th><i class="fa-solid fa-film me-2"></i>Película</th>
                    <th><i class="fa-solid fa-clock me-2"></i>Hora</th>
                    <th><i class="fa-solid fa-door-open me-2"></i>Sala</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="session : ${sessions}">
                    <td th:text="${session.movie.title}"></td>
                    <td th:text="${#temporals.format(session.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${session.room.name}"></td>
                    <td>
                        <a th:href="@{/sessions/{id}(id=${session.id})}" class="btn btn-sm btn-outline-success">
                            <i class="fa-solid fa-arrow-right me-1"></i>Ver
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
